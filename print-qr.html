---
layout: default
title: QR Code
---

<div class="qr-page">
  <h1>Scan to Explore</h1>
  <p class="subtitle">Tonight's wine selection at La Cave d'Artur</p>
  <div id="qrcode"></div>
  <p class="qr-url" id="site-url"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
        integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSi2jPyBFalXnl56eO5tRGHNAMImfNOWjkuQ=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script>
  var siteUrl = "{{ site.url }}{{ site.baseurl }}/";
  document.getElementById("site-url").textContent = siteUrl;
  new QRCode(document.getElementById("qrcode"), {
    text: siteUrl,
    width: 240,
    height: 240,
    colorDark: "#1c1c1c",
    colorLight: "#ffffff"
  });
</script>
