---
layout: default
title: QR Code
---

<div class="qr-page">
  <h1>Scan to Explore</h1>
  <p class="subtitle">Tonight's wine selection at La Cave d'Artur</p>
  <div id="qrcode">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&color=1c1c1c&bgcolor=ffffff&data={{ site.url | append: site.baseurl | append: '/' | url_encode }}"
         alt="QR Code"
         width="240"
         height="240">
  </div>
  <p class="qr-url">{{ site.url }}{{ site.baseurl }}/</p>
</div>
